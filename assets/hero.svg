<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IBRAGMV Nothing-style profile panel</title>
  <desc id="desc">Minimal monochrome profile header with dot grid, technical typography, a blinking accent light, and subtle segmented motion.</desc>
  <defs>
    <pattern id="dotGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#222222"/>
    </pattern>
  </defs>

  <rect width="1280" height="520" rx="28" fill="#000000"/>
  <rect x="24" y="24" width="1232" height="472" rx="24" fill="#000000" stroke="#333333"/>
  <rect width="1280" height="520" rx="28" fill="url(#dotGrid)" opacity="0.25"/>

  <circle cx="92" cy="84" r="7" fill="#D71921">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="112" y="89" fill="#999999" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="14" letter-spacing="0.12em">PROFILE SYSTEM / ONLINE</text>

  <text x="72" y="188" fill="#FFFFFF" font-family="'Doto', 'Space Mono', monospace" font-size="96" letter-spacing="0.02em">IBRAGMV</text>
  <text x="74" y="236" fill="#E8E8E8" font-family="'Space Grotesk', Arial, sans-serif" font-size="26">product engineer with design taste and low tolerance for weak execution</text>

  <text x="74" y="310" fill="#999999" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="12" letter-spacing="0.14em">PRIMARY</text>
  <text x="74" y="348" fill="#FFFFFF" font-family="'Space Grotesk', Arial, sans-serif" font-size="38">build interfaces that feel intentional</text>

  <text x="74" y="402" fill="#999999" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="12" letter-spacing="0.14em">SECONDARY</text>
  <text x="74" y="430" fill="#E8E8E8" font-family="'Space Grotesk', Arial, sans-serif" font-size="20">full-stack systems / AI-native workflows / polished product surfaces</text>

  <text x="74" y="474" fill="#666666" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="12" letter-spacing="0.14em">TERTIARY  BUN FIRST  NO LEGACY  NO SHORTCUTS</text>

  <rect x="880" y="82" width="300" height="138" rx="16" fill="#111111" stroke="#333333"/>
  <text x="912" y="114" fill="#999999" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="12" letter-spacing="0.12em">CURRENT FOCUS</text>
  <text x="912" y="152" fill="#FFFFFF" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="24">README.OS</text>
  <text x="912" y="184" fill="#E8E8E8" font-family="'Space Grotesk', Arial, sans-serif" font-size="17">Nothing-style profile surface</text>

  <rect x="912" y="246" width="36" height="10" fill="#FFFFFF"/>
  <rect x="954" y="246" width="36" height="10" fill="#FFFFFF">
    <animate attributeName="opacity" values="0.18;1;1;0.18" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="996" y="246" width="36" height="10" fill="#FFFFFF">
    <animate attributeName="opacity" values="0.18;0.18;1;0.18" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="1038" y="246" width="36" height="10" fill="#FFFFFF">
    <animate attributeName="opacity" values="0.18;0.18;0.18;1;0.18" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="1080" y="246" width="36" height="10" fill="#222222"/>

  <rect x="880" y="288" width="300" height="138" rx="16" fill="#111111" stroke="#333333"/>
  <text x="912" y="320" fill="#999999" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="12" letter-spacing="0.12em">SYSTEM VALUES</text>
  <text x="912" y="358" fill="#FFFFFF" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="20">00</text>
  <text x="952" y="358" fill="#E8E8E8" font-family="'Space Grotesk', Arial, sans-serif" font-size="18">visual noise</text>
  <text x="912" y="388" fill="#FFFFFF" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="20">01</text>
  <text x="952" y="388" fill="#E8E8E8" font-family="'Space Grotesk', Arial, sans-serif" font-size="18">clear hierarchy</text>
  <text x="912" y="418" fill="#FFFFFF" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="20">02</text>
  <text x="952" y="418" fill="#E8E8E8" font-family="'Space Grotesk', Arial, sans-serif" font-size="18">production discipline</text>
</svg>
