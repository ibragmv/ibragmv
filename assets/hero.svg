<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IBRAGMV profile hero</title>
  <desc id="desc">Animated profile card with subtle colorful gradients and concise profile information.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1180" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#0A0F1E"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 90) rotate(35) scale(320 220)">
      <stop stop-color="#3B82F6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 320) rotate(165) scale(340 240)">
      <stop stop-color="#EC4899" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(940 76) rotate(140) scale(220 140)">
      <stop stop-color="#F59E0B" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#94A3B8" stroke-opacity="0.08"/>
    </pattern>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="24" fill="url(#grid)"/>
  <rect x="14" y="14" width="1252" height="392" rx="18" stroke="#334155"/>

  <circle cx="250" cy="90" r="190" fill="url(#glowBlue)" filter="url(#blur)">
    <animate attributeName="cx" values="250;310;250" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="90;120;90" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1030" cy="320" r="210" fill="url(#glowPink)" filter="url(#blur)">
    <animate attributeName="cx" values="1030;980;1030" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="320;280;320" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="76" r="120" fill="url(#glowOrange)" filter="url(#blur)">
    <animate attributeName="cy" values="76;104;76" dur="7s" repeatCount="indefinite"/>
  </circle>

  <text x="60" y="72" fill="#BFDBFE" font-family="'SFMono-Regular', Consolas, monospace" font-size="18">ibragmv / README.md</text>

  <text x="60" y="146" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Hi, I'm Ibragim 👋</text>
  <text x="60" y="196" fill="#D7E2F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">
    Junior fullstack developer, junior Python developer, and ML enthusiast.
  </text>
  <text x="60" y="236" fill="#D7E2F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">
    I build apps and services with AI integrations, AI tools, and practical ML workflows.
  </text>

  <g>
    <rect x="62" y="280" width="178" height="12" rx="6" fill="#3B82F6"/>
    <rect x="248" y="280" width="92" height="12" rx="6" fill="#8B5CF6"/>
    <rect x="348" y="280" width="126" height="12" rx="6" fill="#EC4899"/>
    <rect x="482" y="280" width="78" height="12" rx="6" fill="#F59E0B"/>
    <rect x="568" y="280" width="114" height="12" rx="6" fill="#10B981"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;8 0;0 0" dur="6s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.92">
    <text x="62" y="332" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">🚀 Full apps, not isolated demos</text>
    <text x="62" y="364" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">🤖 AI inside products, not just as a gimmick</text>
  </g>

  <g>
    <rect x="884" y="74" width="320" height="116" rx="18" fill="#0F172A" fill-opacity="0.84" stroke="#334155"/>
    <text x="916" y="112" fill="#93C5FD" font-family="'SFMono-Regular', Consolas, monospace" font-size="14">CURRENT FOCUS</text>
    <text x="916" y="148" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Shipping real AI-powered products</text>
    <text x="916" y="176" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">fullstack • python • ml • tools</text>
  </g>

  <g>
    <rect x="948" y="252" width="190" height="74" rx="37" fill="#111827" stroke="#334155"/>
    <circle cx="998" cy="289" r="11" fill="#22C55E">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <text x="1022" y="296" fill="#E2E8F0" font-family="'SFMono-Regular', Consolas, monospace" font-size="18">building mode</text>
  </g>
</svg>
