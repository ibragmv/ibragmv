name: Generate Contribution Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,18 * * *"
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake assets
        uses: Platane/snk@v3
        with:
          github_user_name: ibragmv
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=#0f172a&color_dots=#dbeafe,#93c5fd,#60a5fa,#2563eb,#1d4ed8
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#f8fafc&color_dots=#0f172a,#1e293b,#334155,#38bdf8,#f97316

      - name: Publish generated assets
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          force_orphan: true
